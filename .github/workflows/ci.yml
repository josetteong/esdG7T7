# CI for Python services
# Runs pytest per service; ensures pytest is installed even if not in requirements.

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [listing-service, reservation-service, strike-service, striking-svc, claimant-service, notification-service, collection-monitoring-service]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies for ${{ matrix.service }}
        working-directory: esdG7T7/${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip install -U pytest

      - name: Run tests for ${{ matrix.service }}
        env:
          PYTHONPATH: ..
        working-directory: esdG7T7/${{ matrix.service }}
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(tests/**/*.py **/*_test.py **/test_*.py)
          if (( ${#files[@]} )); then
            echo "Running pytest on ${#files[@]} test files"
            python -m pytest -v
          else
            echo "No tests found for ${{ matrix.service }}; skipping."
          fi