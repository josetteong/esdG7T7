_format_version: "2.1"

plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:5173"
        - "http://localhost:3000"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Content-Type
        - Authorization
      exposed_headers:
        - Content-Type
      credentials: true
      max_age: 3600
      preflight_continue: false

services:
  - name: listing-service
    url: http://listing-service:8000
    routes:
      - name: listing-route
        paths:
          - /listings
        strip_path: false

  - name: reservation-service
    url: http://reservation-service:8000
    routes:
      - name: reservation-route
        paths:
          - /reservations
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 10
              policy: local
              limit_by: ip

  - name: strike-service
    url: http://strike-service:8000
    routes:
      - name: strike-route
        paths:
          - /strikes
        strip_path: false

  - name: registration-service
    url: http://registration-service:5000
    routes:
      - name: registration-route
        paths:
          - /registrations
        strip_path: false

  - name: reserve-composite-service
    url: http://reserve-composite-service:8000
    routes:
      - name: reserve-composite-route
        paths:
          - /reserve
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 10
              policy: local
              limit_by: ip

  - name: collection-service
    url: http://collection-service:5000
    routes:
      - name: collection-route
        paths:
          - /collect
        strip_path: false

  - name: vendor-service
    url: http://vendor-service:5000
    routes:
      - name: vendor-route
        paths:
          - /vendors
        strip_path: false

  - name: claimant-service
    url: http://claimant-service:5000
    routes:
      - name: claimant-route
        paths:
          - /claimants
        strip_path: false

  - name: notification-service
    url: http://notification-service:8000
    routes:
      - name: notification-route
        paths:
          - /notifications
        strip_path: false