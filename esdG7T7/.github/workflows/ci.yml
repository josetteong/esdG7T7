name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [listing-service, reservation-service, strike-service, notification-service]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies for ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          cd ${{ matrix.service }}
          pip install -r requirements.txt
      
      - name: Run tests for ${{ matrix.service }}
        env:
          PYTHONPATH: ..
        run: |
          cd ${{ matrix.service }}
          python -m pytest -v