swagger: "2.0"
info:
  title: Registration Service
  version: "1.0"
paths:
  /health:
    get:
      summary: Health check
      responses:
        200:
          description: OK

  /registrations/claimant:
    post:
      summary: Create claimant account and return Telegram onboarding link
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [claimant_name, password]
            properties:
              claimant_name:
                type: string
                example: "Jane Doe"
              email:
                type: string
                example: "jane@example.com"
              password:
                type: string
                example: "securepassword123"
      responses:
        201:
          description: Claimant created and Telegram link returned
        400:
          description: Missing required fields
        502:
          description: Claimant service error

  /registrations/vendor:
    post:
      summary: Create vendor account and return Telegram onboarding link
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [vendor_name, password]
            properties:
              vendor_name:
                type: string
                example: "Fresh Farms"
              contact_email:
                type: string
                example: "vendor@example.com"
              password:
                type: string
                example: "securepassword123"
      responses:
        201:
          description: Vendor created and Telegram link returned
        400:
          description: Missing required fields
        502:
          description: Vendor service error

  /registrations/{user_id}/{recipient_type}:
    get:
      summary: Get registration info (chatId) — called by OutSystems before notifying
      parameters:
        - in: path
          name: user_id
          type: string
          required: true
          example: "1"
        - in: path
          name: recipient_type
          type: string
          required: true
          enum: [CLAIMANT, VENDOR]
      responses:
        200:
          description: Registration info including chatId
        404:
          description: Not found
