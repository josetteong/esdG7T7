services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sfrp
    # Internal-only: avoid host port conflicts; services use DNS name `postgres` on `esd-net`.
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sfrp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - esd-net

  listing-service:
    depends_on:
      postgres:
        condition: service_healthy

  reservation-service:
    depends_on:
      postgres:
        condition: service_healthy

  strike-service:
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    depends_on:
      postgres:
        condition: service_healthy

  claimant-service:
    depends_on:
      postgres:
        condition: service_healthy

  vendor-service:
    depends_on:
      postgres:
        condition: service_healthy

  registration-service:
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: