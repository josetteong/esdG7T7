name: esd-project

services:
  listing-service:
    build:
      context: .
      dockerfile: ./listing-service/Dockerfile
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}

  reservation-service:
    build:
      context: .
      dockerfile: ./reservation-service/Dockerfile
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
      - OUTSYSTEMS_NOTIFY_URL=https://personal-42atob5v.outsystemscloud.com/Notification/rest/NotificationAPI/notify
    depends_on:
      rabbitmq:
        condition: service_healthy

  strike-service:
    build:
      context: .
      dockerfile: ./strike-service/Dockerfile
    ports:
      - "8003:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}

  notification-service:
    build:
      context: .
      dockerfile: ./notification-service/Dockerfile
    ports:
      - "8004:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
      - OUTSYSTEMS_NOTIFY_URL=https://personal-42atob5v.outsystemscloud.com/Notification/rest/Notification/Notify
    depends_on:
      rabbitmq:
        condition: service_healthy

  registration-service:
    build:
      context: .
      dockerfile: ./registration-service/Dockerfile
    ports:
      - "8006:5000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT_USERNAME=SFRB_Notif_BOt

  expiry-monitor-service:
    build:
      context: .
      dockerfile: ./expiry-monitor-service/Dockerfile
    ports:
      - "8005:5000"
    environment:
      - LISTING_SERVICE_URL=http://listing-service:8000
      - CRON_INTERVAL_MINUTES=1
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
    depends_on:
      listing-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  handle-cancellation-service:
    build:
      context: .
      dockerfile: ./handle-cancellation-service/Dockerfile
    ports:
      - "8007:5000"
    environment:
      - RESERVATION_SERVICE_URL=http://reservation-service:8000
      - LISTING_SERVICE_URL=http://listing-service:8000
      - STRIKE_SERVICE_URL=http://strike-service:8000
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s


volumes:
  rabbitmq_data:
